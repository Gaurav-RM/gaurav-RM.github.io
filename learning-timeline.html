<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Learning Journey</title>
  
  <!-- Standalone Chart.js Bundle using an alternative CDN to bypass network blocks -->
  <script src="https://pagecdn.io" crossorigin="anonymous"></script>
  
  <style>
    :root {
      --bg-primary: #ffffff;
      --text-main: #1e293b;
      --text-muted: #64748b;
      --accent: #3b82f6;
      --panel-bg: #f8fafc;
      --border-color: #e2e8f0;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background-color: var(--bg-primary);
      color: var(--text-main);
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 1000px;
      margin: 40px auto;
    }

    .chart-wrapper {
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05);
      position: relative;
      height: 450px;
    }

    #detail-panel {
      margin-top: 24px;
      padding: 20px;
      border-left: 4px solid var(--accent);
      background-color: var(--panel-bg);
      border-radius: 0 12px 12px 0;
      display: none;
    }
  </style>
</head>
<body>

<div class="container">
  <h1 style="margin-bottom: 8px;">Learning Roadmap</h1>
  <p style="color: var(--text-muted); margin-bottom: 32px;">Click on any milestone bar to view learning summaries and deep dives.</p>

  <div class="chart-wrapper">
    <canvas id="roadmapChart"></canvas>
  </div>
  
  <div id="detail-panel">
    <h3 id="panel-title" style="margin: 0 0 6px 0; font-size: 1.25rem;"></h3>
    <p id="panel-desc" style="margin: 14px 0 0 0; line-height: 1.6; color: #334155;"></p>
  </div>
</div>

<script>
  window.addEventListener('DOMContentLoaded', () => {
    if (typeof Chart === 'undefined') {
      alert("Chart engine is blocked by your local network. Please try opening this page on another internet connection or mobile hotspot.");
      return;
    }

    // Time-independent milestone database structure
    const roadmapData = [
      { month: "Jan 2026", category: "Engineering (Base)", title: "Data Structures & Algorithms", desc: "Mastered tree traversals, graph algorithms, and time complexity analysis." },
      { month: "Feb 2026", category: "Language", title: "TypeScript Advanced Types", desc: "Learned utility types, generics, and conditional type mapping." },
      { month: "Mar 2026", category: "Other Tech / Techniques", title: "Docker Containers & Networks", desc: "Configured multi-container microservice environments using docker-compose." },
      { month: "Apr 2026", category: "AI Technologies", title: "LLM Prompt Engineering", desc: "Explored multi-shot prompting, system instructions, and RAG architectures." }
    ];

    const ctx = document.getElementById('roadmapChart').getContext('2d');
    
    new Chart(ctx, {
      type: 'bar',
      data: {
        labels: roadmapData.map(item => item.month),
        datasets: [{
          data: roadmapData.map(item => {
            // Standardizing positioning based on categories
            if (item.category === "AI Technologies") return 4;
            if (item.category === "Language") return 3;
            if (item.category === "Other Tech / Techniques") return 2;
            return 1;
          }),
          backgroundColor: '#3b82f6',
          borderRadius: 6,
          borderSkipped: false,
          barThickness: 40
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: (context) => ` Topic: ${roadmapData[context.dataIndex].title}`
            }
          }
        },
        onClick: (event, elements) => {
          if (elements.length > 0) {
            const index = elements[0].index;
            const matched = roadmapData[index];
            
            document.getElementById('panel-title').innerText = `${matched.title} (${matched.category})`;
            document.getElementById('panel-desc').innerText = matched.desc;
            document.getElementById('detail-panel').style.display = 'block';
          }
        },
        scales: {
          y: {
            min: 0,
            max: 5,
            ticks: {
              stepSize: 1,
              callback: function(value) {
                if (value === 4) return 'AI Technologies';
                if (value === 3) return 'Language';
                if (value === 2) return 'Other Tech / Techniques';
                if (value === 1) return 'Engineering (Base)';
                return '';
              }
            }
          }
        }
      }
    });
  });
</script>

</body>
</html>
