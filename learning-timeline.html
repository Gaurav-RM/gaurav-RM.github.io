<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Learning Journey</title>
  
  <!-- Core Chart.js Engines -->
  <script src="https://cloudflare.com"></script>
<script src="https://cloudflare.com"></script>
<script src="https://cloudflare.com"></script>
  
  <style>
    :root {
      --bg-primary: #ffffff;
      --text-main: #1e293b;
      --text-muted: #64748b;
      --accent: #3b82f6;
      --panel-bg: #f8fafc;
      --border-color: #e2e8f0;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background-color: var(--bg-primary);
      color: var(--text-main);
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 1000px;
      margin: 40px auto;
    }

    .chart-wrapper {
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05);
      position: relative;
      height: 450px;
    }

    #detail-panel {
      margin-top: 24px;
      padding: 20px;
      border-left: 4px solid var(--accent);
      background-color: var(--panel-bg);
      border-radius: 0 12px 12px 0;
      display: none;
    }
  </style>
</head>
<body>

<div class="container">
  <h1 style="margin-bottom: 8px;">Learning Roadmap</h1>
  <p style="color: var(--text-muted); margin-bottom: 32px;">Click on any milestone icon to view learning summaries and deep dives.</p>

  <div class="chart-wrapper">
    <canvas id="roadmapChart"></canvas>
  </div>
  
  <div id="detail-panel">
    <h3 id="panel-title" style="margin: 0 0 6px 0; font-size: 1.25rem;"></h3>
    <small id="panel-date" style="color: var(--text-muted); font-weight: 500;"></small>
    <p id="panel-desc" style="margin: 14px 0 0 0; line-height: 1.6; color: #334155;"></p>
  </div>
</div>

<script>
  const CATEGORIES = { AI: 4, Language: 3, OtherTech: 2, Engineering: 1 };

  // Hardcoded direct database array overrides browser CORS security blocks locally
  const rawData = [
    { x: "2026-01-15", y: CATEGORIES.Engineering, title: "Data Structures & Algorithms", desc: "Mastered tree traversals, graph algorithms, and time complexity analysis.", iconUrl: "https://icons8.com" },
    { x: "2026-02-10", y: CATEGORIES.Language, title: "TypeScript Advanced Types", desc: "Learned utility types, generics, and conditional type mapping.", iconUrl: "https://icons8.com" },
    { x: "2026-03-05", y: CATEGORIES.OtherTech, title: "Docker Containers & Networks", desc: "Configured multi-container microservice environments using docker-compose.", iconUrl: "https://icons8.com" },
    { x: "2026-04-20", y: CATEGORIES.AI, title: "LLM Prompt Engineering", desc: "Explored multi-shot prompting, system instructions, and RAG architectures.", iconUrl: "https://icons8.com" }
  ];

  // Promise logic ensuring icons render natively without popping out blank
  function preloadMilestoneImages(data) {
    return Promise.all(data.map(item => {
      return new Promise((resolve) => {
        const img = new Image(32, 32);
        img.src = item.iconUrl;
        img.onload = () => {
          item.pointStyle = img;
          resolve(item);
        };
        img.onerror = () => {
          item.pointStyle = 'circle'; // Standard fallback style if image breaks
          resolve(item);
        };
      });
    }));
  }

  async function renderChart() {
    const processedPoints = await preloadMilestoneImages(rawData);
    const ctx = document.getElementById('roadmapChart').getContext('2d');
    
    new Chart(ctx, {
      type: 'scatter',
      data: {
        datasets: [{
          data: processedPoints,
          pointStyle: processedPoints.map(p => p.pointStyle),
          pointHoverRadius: 20
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        onClick: (event, elements) => {
          if (elements.length > 0) {
            const index = elements[0].index;
            const matched = processedPoints[index];
            
            document.getElementById('panel-title').innerText = matched.title;
            document.getElementById('panel-date').innerText = `Achieved on: ${matched.x}`;
            document.getElementById('panel-desc').innerText = matched.desc;
            document.getElementById('detail-panel').style.display = 'block';
          }
        },
        scales: {
          x: {
            type: 'time',
            time: { unit: 'month', displayFormats: { month: 'MMM yyyy' } },
            title: { display: true, text: 'Timeline Progression' }
          },
          y: {
            min: 0.5,
            max: 4.5,
            ticks: {
              stepSize: 1,
              callback: function(value) {
                if (value === 4) return 'AI Technologies';
                if (value === 3) return 'Language';
                if (value === 2) return 'Other Tech / Techniques';
                if (value === 1) return 'Engineering (Base)';
                return '';
              }
            }
          }
        }
      }
    });
  }

  renderChart();
</script>

</body>
</html>
