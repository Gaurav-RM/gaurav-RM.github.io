<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Learning Journey</title>
  
  <!-- Chart.js Engine and Date Adapter CDNs -->
  <script src="https://jsdelivr.net"></script>
  <script src="https://jsdelivr.net"></script>
  
  <style>
    :root {
      --bg-primary: #ffffff;
      --text-main: #1e293b;
      --text-muted: #64748b;
      --accent: #3b82f6;
      --panel-bg: #f8fafc;
      --border-color: #e2e8f0;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background-color: var(--bg-primary);
      color: var(--text-main);
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 1000px;
      margin: 40px auto;
    }

    .chart-box {
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05);
    }

    /* Detail slider card styling */
    #detail-panel {
      margin-top: 24px;
      padding: 20px;
      border-left: 4px solid var(--accent);
      background-color: var(--panel-bg);
      border-radius: 0 12px 12px 0;
      box-shadow: inset 0 1px 2px rgb(0 0 0 / 0.02);
      display: none;
      animation: fadeIn 0.3s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<div class="container">
  <h1 style="margin-bottom: 8px;">Learning Roadmap</h1>
  <p style="color: var(--text-muted); margin-bottom: 32px;">Click on any milestone icon to view learning summaries and deep dives.</p>

  <div class="chart-box">
    <canvas id="roadmapChart" height="400"></canvas>
  </div>
  
  <!-- Info Display Section -->
  <div id="detail-panel">
    <h3 id="panel-title" style="margin: 0 0 6px 0; font-size: 1.25rem;"></h3>
    <small id="panel-date" style="color: var(--text-muted); font-weight: 500;"></small>
    <p id="panel-desc" style="margin: 14px 0 0 0; line-height: 1.6; color: #334155;"></p>
  </div>
</div>

<script>
  // Pull data from external JSON file asynchronously
  async function initRoadmap() {
    try {
      const response = await fetch('./learning-data.json');
      const rawData = await response.json();

      // Convert image path strings to real pre-loaded HTML Image objects
      const processedPoints = rawData.map(item => {
        const img = new Image(28, 28);
        img.src = item.iconUrl;
        return {
          ...item,
          pointStyle: img
        };
      });

      const ctx = document.getElementById('roadmapChart').getContext('2d');
      
      new Chart(ctx, {
        type: 'scatter',
        data: {
          datasets: [{
            data: processedPoints,
            pointStyle: processedPoints.map(p => p.pointStyle),
            pointHoverRadius: 18
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false }
          },
          // Click monitoring action
          onClick: (event, elements, chart) => {
            if (elements.length > 0) {
              const index = elements[0].index;
              const matched = processedPoints[index];
              
              document.getElementById('panel-title').innerText = matched.title;
              document.getElementById('panel-date').innerText = `Achieved on: ${matched.x}`;
              document.getElementById('panel-desc').innerText = matched.desc;
              document.getElementById('detail-panel').style.display = 'block';
            }
          },
          scales: {
            x: {
              type: 'time',
              time: { unit: 'month', displayFormats: { month: 'MMM yyyy' } },
              grid: { color: '#f1f5f9' },
              title: { display: true, text: 'Timeline Progression' }
            },
            y: {
              min: 0.5,
              max: 4.5,
              ticks: {
                stepSize: 1,
                callback: function(value) {
                  if (value === 4) return 'AI Technologies';
                  if (value === 3) return 'Language';
                  if (value === 2) return 'Other Tech / Techniques';
                  if (value === 1) return 'Engineering (Base)';
                  return '';
                }
              },
              grid: { color: '#e2e8f0' }
            }
          }
        }
      });

    } catch (error) {
      console.error("Error loading roadmap milestones:", error);
    }
  }

  // Execute chart on load
  initRoadmap();
</script>

</body>
</html>
